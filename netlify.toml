# Netlify configuration for Automatifan site

[build]
  publish = "."
  functions = "netlify/functions"

# Prefer https + non-www (fixes Soft 404 when Google crawls www or http)
[[redirects]]
  from = "http://www.automatifan.rs/*"
  to = "https://automatifan.rs/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.automatifan.rs/*"
  to = "https://automatifan.rs/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://automatifan.rs/*"
  to = "https://automatifan.rs/:splat"
  status = 301
  force = true
